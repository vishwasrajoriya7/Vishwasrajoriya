<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>A Question For You</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="gradient-bg"></div>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="container">

    <section class="hero">

        <div class="glass-card">

            <h1 id="questionTitle">
                A Question For You
            </h1>

            <p id="questionText">
                ...
            </p>

            <div class="buttons">

                <button id="yesBtn">
                    Yes
                </button>

                <button id="noBtn">
                    No
                </button>

            </div>

        </div>

    </section>

</div>

<script>

const lines = [

"Hey...",

"I've been wanting to tell you something...",

"You always make me smile.",

"And I wanted to ask...",

"Will you go out with me?"

];

let current = 0;

const text =
document.getElementById("questionText");

function showNext(){

    if(current < lines.length){

        text.innerHTML = lines[current];

        current++;

        setTimeout(showNext,1800);

    }

}

showNext();

document.getElementById("yesBtn")
.onclick=function(){

    window.location.href="yes.html";

};

const no =
document.getElementById("noBtn");

no.addEventListener("mouseenter",move);

no.addEventListener("click",move);

function move(){

    const x =
    Math.random()*220-110;

    const y =
    Math.random()*120-60;

    no.style.transform =
    `translate(${x}px,${y}px)`;

}

</script>

</body>

</html>
